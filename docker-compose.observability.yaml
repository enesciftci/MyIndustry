# Observability stack for Dokploy production.
# Dokploy Compose path: docker-compose.observability.yaml
# Deploy as a separate Dokploy compose stack on the same node as app services.
#
# Required environment variables (set in Dokploy):
# - ELASTIC_PASSWORD
# - DOMAIN (Kibana Traefik host)
# Optional:
# - KIBANA_SYSTEM_PASSWORD (defaults to ELASTIC_PASSWORD; synced by es-setup)
# - ES_JAVA_OPTS (defaults to -Xms512m -Xmx512m)
# - ES_MEMORY_LIMIT (defaults to 1536m)

services:
  es-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: myindustry-es-setup
    restart: "no"
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-${ELASTIC_PASSWORD}}
    networks:
      - dokploy-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        set -e
        echo "Setting kibana_system password"
        until curl -sf -X POST -u "elastic:$$ELASTIC_PASSWORD" \
          -H "Content-Type: application/json" \
          "http://elasticsearch:9200/_security/user/kibana_system/_password" \
          -d "{\"password\":\"$$KIBANA_SYSTEM_PASSWORD\"}"; do
          echo "Retrying..."
          sleep 5
        done
        echo "kibana_system password set"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: myindustry-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${ES_MEMORY_LIMIT:-1536m}

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: myindustry-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-${ELASTIC_PASSWORD}}
      SERVER_PUBLICBASEURL: https://kibana.${DOMAIN:-localhost}
    networks:
      - dokploy-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      es-setup:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.myindustry-kibana.rule=Host(`kibana.${DOMAIN:-localhost}`)"
      - "traefik.http.services.myindustry-kibana.loadbalancer.server.port=5601"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.0
    container_name: myindustry-filebeat
    restart: unless-stopped
    user: root
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
      SERVICE_ENVIRONMENT: production
    volumes:
      - ./observability/filebeat/filebeat.dokploy.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./observability/elasticsearch/ilm-myindustry-logs.json:/usr/share/filebeat/ilm-policy.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - dokploy-network
    depends_on:
      elasticsearch:
        condition: service_healthy
      es-setup:
        condition: service_completed_successfully

networks:
  dokploy-network:
    external: true
    name: dokploy-network

volumes:
  elasticsearch_data:
    name: myindustry-elasticsearch-data
